<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
const W = 200, H = 200;
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(W, H);
renderer.setPixelRatio(window.devicePixelRatio);
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 100);
camera.position.set(0, 0.5, 4.5);

scene.add(new THREE.AmbientLight(0xffeedd, 0.8));
const key = new THREE.DirectionalLight(0xffffff, 1.8);
key.position.set(3, 4, 3);
scene.add(key);
const rim = new THREE.DirectionalLight(0xff4400, 1.0);
rim.position.set(-3, -1, -2);
scene.add(rim);

let model = null;
const loader = new THREE.GLTFLoader();
loader.load('briefcase.glb', gltf => {
  model = gltf.scene;
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  const s = 2.4 / Math.max(size.x, size.y, size.z);
  model.scale.setScalar(s);
  model.position.sub(center.multiplyScalar(s));
  scene.add(model);
});

let mouseX = 0;
window.addEventListener('message', e => {
  if (e.data?.mouseX !== undefined) mouseX = e.data.mouseX;
});

(function animate() {
  requestAnimationFrame(animate);
  if (model) {
    model.rotation.y -= 0.007 + mouseX * 0.008;
    model.rotation.x = Math.sin(Date.now() * 0.0004) * 0.08;
  }
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
